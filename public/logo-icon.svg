<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 40" fill="none">
  <defs>
    <linearGradient id="sdi-grad" x1="2" y1="2" x2="48" y2="38" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#67E8F9"/>
      <stop offset="40%" stop-color="#38BDF8"/>
      <stop offset="100%" stop-color="#0369A1"/>
    </linearGradient>
    <linearGradient id="sdi-grad-accent" x1="22" y1="4" x2="46" y2="36" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#22D3EE"/>
      <stop offset="100%" stop-color="#0EA5E9"/>
    </linearGradient>
    <radialGradient id="sdi-node-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#38BDF8" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#38BDF8" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Pentagon/chevron container -->
  <path d="M5 3 L35 3 L47 20 L35 37 L5 37 Z" fill="url(#sdi-grad)" fill-opacity="0.10"/>
  <path d="M5 3 L35 3 L47 20 L35 37 L5 37 Z" fill="none" stroke="url(#sdi-grad)" stroke-width="2" stroke-linejoin="round"/>

  <!-- Top edge highlight -->
  <path d="M5 3 L35 3" stroke="#67E8F9" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>

  <!-- Circuit trace connector -->
  <path d="M23 8 L25.5 14 L23 20 L25.5 26 L23 32" stroke="url(#sdi-grad-accent)" stroke-width="1.3" fill="none" opacity="0.40" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- S — Bold dominant letter -->
  <text x="8" y="28.5" font-family="Inter, -apple-system, sans-serif" font-size="27" font-weight="700" fill="url(#sdi-grad)">S</text>

  <!-- D — right section top -->
  <text x="27" y="19" font-family="Inter, -apple-system, sans-serif" font-size="14.5" font-weight="700" fill="url(#sdi-grad)">D</text>

  <!-- A — right section bottom -->
  <text x="27" y="34" font-family="Inter, -apple-system, sans-serif" font-size="14.5" font-weight="700" fill="url(#sdi-grad)">A</text>

  <!-- Accent node glow -->
  <circle cx="24" cy="20" r="6" fill="url(#sdi-node-glow)"/>
  <!-- Accent node core -->
  <circle cx="24" cy="20" r="2.5" fill="#38BDF8"/>
  <!-- Accent node highlight -->
  <circle cx="24" cy="20" r="1" fill="#FFFFFF" opacity="0.7"/>
</svg>